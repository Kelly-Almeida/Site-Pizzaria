<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de forma de pagamento</title>
    <link rel="stylesheet" href="/Pizzaria/estilos/style.css"> 
    <script src="/Pizzaria/CadEstabelecimento/script.js"></script>
    
</head>
<body>
    <div id="container">

    
        <header>
            <div class="itemH1 caixaVermelha">
                <h1 class="h1Shadow fontAmarela">Usuário</h1>
            </div>
            

            <div id="logo" class="itemlogo" >
                <img src="/Pizzaria/imgs/logo.png" alt="Logo pizzaria Boa Pizza">
            </div>

            <nav class="itemNav" id="navegador">
                <div ><img src="/Pizzaria/icons/menu-hamburguer.png" alt="menu" id="menu-mobile" onclick="abrirMenu()"></div>

                <ul id ="menu">
                    <li id="fechar-mobile-li"><img src="/Pizzaria/icons/fechar.png" alt="Fechar" id="fechar-mobile" onclick="fecharMenu()"></li>
                    <li><a href="/Pizzaria/langing-page/index.html"><img src="/Pizzaria/icons/icon-home.png" alt="Home"></a></li>
                    <li><a href="/Pizzaria/login/index.html"><img src="/Pizzaria/icons/icon-login.png" alt="Login"></a></li>
                    <li><a href="/Pizzaria/Cardapio/index.html"><img src="/Pizzaria/icons/icon-compras.png" alt="Compras"></a></li>
                    <li><a href="/Pizzaria/CadCliente/index.html"><img src="/Pizzaria/icons/icon-cad.png" alt="Cadastro"></a></li>
                    <li><a href="/Pizzaria/CadUser/index.html"><img src="/Pizzaria/icons/cadastros.png" alt="Cadastros"></a></li>
                </ul>

                
            </nav>
        </header>


        <main>
            <form action="#" class="conteudo-central">


                <div class="contanerForm" id="nome">
                    <label for="nome">Nome: </label> <input type="text" name="nome" placeholder="João...">
                </div>

                <div class="contanerForm" id="idFuncio">
                    <label for="idFuncio">CPF: </label> <input type="text" name="idFuncio" placeholder="12345678910">
                </div>

                <div class="contanerForm">
                    <label for="telefone">Telefone: </label> <input type="tel" name="telefone" placeholder="(77) 6969-6969">
                </div>

                <div class="contanerForm" id="endereco">
                    <label for="endereco">Endereço: </label> <input type="text" name="endereco" placeholder="Rua das Almas 777...">
                </div>

                <div class="botoes">
                        <div class = "caixaVermelha btn">
                            <input type="submit" value="Cancelar" class="fontAmarela">
                        </div>

                        <div class = "caixaVermelha btn">
                            <input type="button" value="Cadastro" class="fontAmarela">
                        </div>
                </div>
                
                
                
            </form>
        </main>

        <footer>
            <ul>
                <li>Rua Sapa Karol, 69 - Ponta Grossa</li>
                <span class="ponto"></span>
                <li>(77) 69699-9696</li>
                <span class="ponto"></span>
                <li><a href="">vemComerM2026@rochadeira.com</a></li>
            </ul>
        </footer>
    </div>
</body>

</html>
