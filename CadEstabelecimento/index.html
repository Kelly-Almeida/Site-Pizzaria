<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de estabelecimento</title>
    <link rel="stylesheet" href="/estilos/style.css"> 
    <script src="/CadEstabelecimento/script.js"></script>
   
</head>
<body>
    <div id="container">

    
        <header>
            <div class="itemH1 caixaVermelha">
                <h1 class="h1Shadow fontAmarela">Estabelecimento</h1>
            </div>
            

            <div id="logo" class="itemlogo" >
                <img src="/imgs/logo.png" alt="Logo pizzaria Boa Pizza">
            </div>

            <nav class="itemNav" id="navegador">
                <div ><img src="/icons/menu-hamburguer.png" alt="menu" id="menu-mobile" onclick="abrirMenu()"></div>

                <ul id ="menu">
                    <li id="fechar-mobile-li"><img src="icons/fechar.png" alt="Fechar" id="fechar-mobile" onclick="fecharMenu()"></li>
                    <li><a href="/langing-page/index.html"><img src="/icons/icon-home.png" alt="Home"></a></li>
                    <li><a href="/login/index.html"><img src="/icons/icon-login.png" alt="Login"></a></li>
                    <li><a href="/Cardapio/index.html"><img src="/icons/icon-compras.png" alt="Compras"></a></li>
                    <li><a href="/CadCliente/index.html"><img src="/icons/icon-cad.png" alt="Cadastro"></a></li>
                    <li><a href="/CadUser/index.html"><img src="/icons/cadastros.png" alt="Cadastros"></a></li>
                </ul>

                
            </nav>
        </header>


        <main>
            <form action="#" class="conteudo-central">

                <div class="contanerForm">
                    <label for="nome">Nome: </label> <input type="text" name="nome" placeholder="Boa pizza...">
                </div>

                <div class="contanerForm">
                    <label for="cnpj">CNPJ: </label> <input type="text" name="cnpj" placeholder="00.000.000/0000-00">
                </div>

                <div class="contanerForm">
                    <label for="instEstadual">Inscrição estadual: </label> <input type="text" name="instEstadual" placeholder="110.042.490.114">
                </div>

                <div class="contanerForm">
                    <label for="endereco">Endereço: </label> <input type="text" name="endereco" placeholder="Rua Sapa Karol, 69 - Ponta Grossa">
                </div>

                <div class="contanerForm">
                    <label for="telefone">Telefone: </label> <input type="tel" name="telefone" placeholder="(77) 6969-6969">
                </div>

                <div class="contanerForm">
                    <label for="email">Email: </label> <input type="email" name="email" placeholder="vemComerM2026@rochadeira.com">
                </div>

                <div class="botoes">
                        <div class = "caixaVermelha btn">
                            <input type="submit" value="Cancelar" class="fontAmarela">
                        </div>

                        <div class = "caixaVermelha btn">
                            <input type="button" value="Cadastrar" class="fontAmarela">
                        </div>
                </div>
                
                
                
            </form>
        </main>

        <footer>
            <ul>
                <li>Rua Sapa Karol, 69 - Ponta Grossa</li>
                <span class="ponto"></span>
                <li>(77) 69699-9696</li>
                <span class="ponto"></span>
                <li><a href="">vemComerM2026@rochadeira.com</a></li>
            </ul>
        </footer>
    </div>
</body>

</html>
